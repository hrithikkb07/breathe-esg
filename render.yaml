##
# Render Blueprint — Breathe ESG
# Deploys: Django API + PostgreSQL + React static site
#
# How to use:
#   1. Push this repo to GitHub
#   2. Go to render.com → New → Blueprint
#   3. Connect your GitHub repo
#   4. Render reads this file and creates all services automatically
#
# After first deploy:
#   - Shell into the web service and run: python manage.py seed_demo_data
##

services:
  # ── Django REST API ─────────────────────────────────────────────────────────
  - type: web
    name: breathe-esg-api
    runtime: python
    rootDir: backend
    plan: free
    pythonVersion: "3.11"
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "breathe-esg-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      # DATABASE_URL is auto-parsed in settings — add dj-database-url if needed
      - key: DB_NAME
        fromDatabase:
          name: breathe-esg-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: breathe-esg-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: breathe-esg-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: breathe-esg-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: breathe-esg-db
          property: port

  # ── React Frontend (static site) ────────────────────────────────────────────
  - type: web
    name: breathe-esg
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # SPA: all routes fall back to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://breathe-esg-api.onrender.com/api"

# ── PostgreSQL ──────────────────────────────────────────────────────────────
databases:
  - name: breathe-esg-db
    plan: free
    databaseName: breathe_esg
    user: breathe_esg