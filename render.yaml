##
# Render Blueprint — Breathe ESG
# Deploys: Django API + PostgreSQL + React static site
##

services:
  # ── Django REST API ─────────────────────────────────────────────────────────
  - type: web
    name: breathe-esg-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py seed_demo_data
    startCommand: gunicorn config.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "breathe-esg-api-qncw.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg-c847.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DB_NAME
        fromDatabase:
          name: breathe-esg-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: breathe-esg-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: breathe-esg-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: breathe-esg-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: breathe-esg-db
          property: port

  # ── React Frontend (static site) ────────────────────────────────────────────
  - type: web
    name: breathe-esg
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://breathe-esg-api-qncw.onrender.com/api"

# ── PostgreSQL ──────────────────────────────────────────────────────────────
databases:
  - name: breathe-esg-db
    plan: free
    databaseName: breathe_esg
    user: breathe_esg
